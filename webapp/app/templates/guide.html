{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block heading %}{% endblock %}
{% block content %}
<a href="/guides" class="muted" style="font-size:.85rem">← All guides</a>
<div class="card mt" style="margin-top:12px">
  <div class="prose">{{ body|safe }}</div>
</div>
<style>
  .prose h1 { font-size: 1.6rem; margin-top: 0; }
  .prose h2 { font-size: 1.2rem; margin-top: 1.4em; color: var(--brand-ink); }
  .prose h3 { font-size: 1rem; margin-top: 1.2em; }
  .prose p, .prose li { line-height: 1.65; }
  .prose code { background: var(--surface-2); }
  .prose pre { background: var(--surface-2); padding: 14px; border-radius: 12px; overflow-x: auto; }
  .prose pre code { background: none; padding: 0; }
  .prose table { border-collapse: collapse; width: 100%; }
  .prose th, .prose td { border: 1px solid var(--line); padding: 8px 12px; text-align: left; }
  .prose blockquote { border-left: 3px solid var(--brand); margin: 1em 0; padding: 4px 16px; color: var(--muted); }
</style>
{% endblock %}
